<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Chart Bar Gradient (Pink/Purple) -->
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9333EA" />
      <stop offset="100%" stop-color="#F43F5E" />
    </linearGradient>

    <!-- Chart Bar Gradient 2 (Cyan/Blue) -->
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0284C7" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>

    <!-- Magnifying Glass Glow Gradient -->
    <linearGradient id="magGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Base Rectangle -->
  <rect x="24" y="24" width="976" height="976" rx="220" ry="220" fill="url(#bgGrad)" />
  
  <!-- Decorative abstract lines / tech vibe -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="40"/>
  <circle cx="512" cy="512" r="200" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="20"/>

  <g filter="url(#shadow)">
    <!-- Chart Bars -->
    <!-- Bar 1 (Short) -->
    <rect x="280" y="580" width="100" height="200" rx="30" fill="url(#barGrad2)" opacity="0.85"/>
    <!-- Bar 2 (Medium) -->
    <rect x="460" y="420" width="100" height="360" rx="30" fill="url(#barGrad)" opacity="0.95"/>
    <!-- Bar 3 (Tall) -->
    <rect x="640" y="240" width="100" height="540" rx="30" fill="url(#barGrad2)" opacity="0.85"/>
  </g>

  <!-- Magnifying Glass -->
  <g filter="url(#shadow)">
    <!-- Lens Ring -->
    <circle cx="450" cy="450" r="180" fill="none" stroke="url(#magGrad)" stroke-width="60" />
    
    <!-- Lens Glass highlight (subtle fill) -->
    <circle cx="450" cy="450" r="150" fill="#ffffff" opacity="0.05" />

    <!-- Handle -->
    <path d="M 577 577 L 760 760" stroke="url(#magGrad)" stroke-width="70" stroke-linecap="round" />
    
    <!-- Inner Lens highlight curve -->
    <path d="M 330 330 A 120 120 0 0 1 450 280" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>