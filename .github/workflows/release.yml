name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build release notes from commits
        id: notes
        shell: pwsh
        run: |
          $currentTag = "${{ github.ref_name }}"
          $previousTag = git tag --sort=-v:refname | Select-Object -Skip 1 -First 1

          if (-not $previousTag) {
            $body = @"
          Release $currentTag

          Initial tagged release notes are not available.
          "@
          }
          else {
            $lines = git log "$previousTag..$currentTag" --pretty=format:"- %s"
            if (-not $lines) {
              $lines = "- No user-facing commits in this range."
            }
            $body = @"
          ## What's changed

          $lines
          "@
          }

          "release_body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "LoL Meta Analyzer ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: "--bundles msi,nsis"
